name: Test basic zip usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create files to zip
        run: |
          mkdir -p /tmp/ziptest
          echo "hello world" > /tmp/ziptest/hello.txt
          echo "foo bar" > /tmp/ziptest/foo.txt

      - id: action
        uses: .
        with:
          args: -r /tmp/output.zip /tmp/ziptest

      - name: Assert zip file was created
        run: |
          echo "Checking if zip file was created..."
          if [ ! -f /tmp/output.zip ]; then
            echo "FAIL: /tmp/output.zip was not created"
            exit 1
          fi
          echo "PASS: zip file exists"

      - name: Assert zip file contains expected files
        run: |
          echo "Listing zip contents..."
          unzip -l /tmp/output.zip
          if ! unzip -l /tmp/output.zip | grep -q "hello.txt"; then
            echo "FAIL: hello.txt not found in zip"
            exit 1
          fi
          if ! unzip -l /tmp/output.zip | grep -q "foo.txt"; then
            echo "FAIL: foo.txt not found in zip"
            exit 1
          fi
          echo "PASS: zip contains expected files"
